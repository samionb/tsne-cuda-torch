name: GPU Benchmarks

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: GPU-enabled runner label to target
        required: true
        default: ubuntu-gpu
        type: string
      python_version:
        description: Python version used for the benchmark job
        required: true
        default: "3.11"
        type: string
      datasets:
        description: Space-separated dataset names passed to tsne-torch-benchmark
        required: true
        default: blobs_2048_f512
        type: string
      repeats:
        description: Number of repeated runs per baseline
        required: true
        default: "1"
        type: string
      output_stem:
        description: Output stem under benchmarks/results
        required: true
        default: benchmark_gpu_manual
        type: string

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ${{ inputs.runner_label }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Verify CUDA runtime
        run: |
          python - <<'PY'
          import torch

          print(f"torch={torch.__version__}")
          print(f"cuda_available={torch.cuda.is_available()}")
          if not torch.cuda.is_available():
              raise SystemExit("CUDA is required for this workflow.")
          print(f"device_name={torch.cuda.get_device_name(0)}")
          PY

      - name: Run GPU benchmark
        run: |
          python -m tsne_torch.benchmarking \
            --device cuda \
            --repeats "${{ inputs.repeats }}" \
            --datasets ${{ inputs.datasets }} \
            --output "benchmarks/results/${{ inputs.output_stem }}.json"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.output_stem }}
          path: |
            benchmarks/results/${{ inputs.output_stem }}.json
            benchmarks/results/${{ inputs.output_stem }}*.png
          if-no-files-found: error
