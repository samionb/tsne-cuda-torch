name: Lint

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run flake8
        run: python -m flake8 .

      - name: Run pydocstyle
        run: python -m pydocstyle src tests benchmarks

      - name: Run Markdown lint
        run: python -m pymarkdown --config .pymarkdown.json scan README.md docs

      - name: Verify Python files compile
        run: python -m compileall src tests benchmarks

      - name: Run test suite
        run: python -m pytest -q --basetemp .pytest_tmp
